<div class="flex flex-col flex-auto min-w-0">
    <div
        class="flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between p-6 sm:py-8 sm:px-10 border-b bg-card dark:bg-transparent"
    >
        <div class="flex-1 min-w-0">
            <div class="mt-2">
                <h2
                    class="text-3xl md:text-4xl font-extrabold tracking-tight leading-7 sm:leading-10 truncate"
                >
                    Users
                </h2>
            </div>
        </div>
        <div class="flex flex-shrink-0 items-center mt-6 sm:mt-0 sm:ml-4">
            <button
                mat-flat-button
                color="primary"
                (click)="openCreateUserModal()"
                class="text-white"
            >
                <mat-icon
                    class="icon-size-5 mr-2"
                    svgIcon="heroicons_solid:plus"
                ></mat-icon>
                Add User
            </button>
        </div>
    </div>

    <div class="flex-auto p-6 sm:p-10">
        <div class="bg-card shadow rounded mt-3 sm:mt-6">
            <table
                class="w-full text-center"
                mat-table
                [dataSource]="dataSource"
            >
                <ng-container matColumnDef="fullName">
                    <th
                        mat-header-cell
                        *matHeaderCellDef
                        class="mx-2 text-center"
                    >
                        Full Name
                    </th>
                    <td mat-cell *matCellDef="let element" class="text-center">
                        {{ element.fullName }}
                    </td>
                </ng-container>
                <ng-container matColumnDef="username">
                    <th
                        mat-header-cell
                        *matHeaderCellDef
                        class="mx-2 text-center"
                    >
                        Username
                    </th>
                    <td
                        mat-cell
                        *matCellDef="let element"
                        class="w-15 text-center"
                    >
                        {{ element.username }}
                    </td>
                </ng-container>

                <ng-container matColumnDef="role">
                    <th
                        mat-header-cell
                        *matHeaderCellDef
                        class="mx-2 text-center"
                    >
                        Role
                    </th>
                    <td
                        mat-cell
                        *matCellDef="let element"
                        class="w-15 text-center"
                    >
                        {{ element.role }}
                    </td>
                </ng-container>

                <ng-container matColumnDef="status">
                    <th
                        mat-header-cell
                        *matHeaderCellDef
                        class="mx-2 text-center"
                    >
                        Status
                    </th>
                    <td mat-cell *matCellDef="let element">
                        <app-status-chip
                            [status]="element.isActive ? 'Active' : 'Inactive'"
                        ></app-status-chip>
                    </td>
                </ng-container>
                <ng-container matColumnDef="createdAt">
                    <th
                        mat-header-cell
                        *matHeaderCellDef
                        class="mx-2 text-center"
                    >
                        Created At
                    </th>
                    <td mat-cell *matCellDef="let element">
                        {{ element.createdAt | date: "dd/MM/yyyy hh:mm a" }}
                    </td>
                </ng-container>
                <ng-container matColumnDef="actions">
                    <th
                        mat-header-cell
                        *matHeaderCellDef
                        class="mx-2 text-center w-30"
                    >
                        Actions
                    </th>
                    <td mat-cell *matCellDef="let element">
                        <div class="flex">
                            <button
                                mat-icon-button
                                (click)="changeStatus(element)"
                                matTooltip="Change Status"
                                [disabled]="loggedUserId == element.id"
                            >
                                <mat-icon
                                    svgIcon="mat_solid:published_with_changes"
                                    class="icon-size-4"
                                ></mat-icon>
                            </button>
                            <!-- <button
                                mat-icon-button
                                (click)="changePassword(element)"
                                matTooltip="Change Password"
                                [disabled]="loggedUserId == element.id"
                            >
                                <mat-icon
                                    svgIcon="mat_outline:password"
                                    class="icon-size-4"
                                ></mat-icon>
                            </button> -->
                            <button
                                mat-icon-button
                                (click)="removeUser(element)"
                                matTooltip="Delete"
                                [disabled]="loggedUserId == element.id"
                            >
                                <mat-icon
                                    svgIcon="heroicons_outline:trash"
                                    class="icon-size-4"
                                ></mat-icon>
                            </button>
                        </div>
                    </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr
                    mat-row
                    *matRowDef="let row; columns: displayedColumns"
                ></tr>
            </table>
            <div
                class="flex flex-row justify-end border-t bg-gray-50 dark:bg-gray-700"
            >
                <mat-paginator
                    showFirstLastButtons
                    [pageSizeOptions]="[10, 15, 20]"
                    class="bg-gray-50 dark:bg-gray-700"
                >
                </mat-paginator>
            </div>
        </div>
    </div>
</div>

<ng-template #createUserModal>
    <form [formGroup]="formGroup" (ngSubmit)="submit()">
        <div>
            <mat-form-field class="w-full">
                <mat-label>Full Name</mat-label>
                <input type="text" matInput formControlName="fullName" />
            </mat-form-field>

            <mat-form-field class="w-full">
                <mat-label>Username</mat-label>
                <input type="text" matInput formControlName="username" />
            </mat-form-field>

            <mat-form-field class="w-full">
                <mat-label>Password</mat-label>
                <input type="text" matInput formControlName="password" />
            </mat-form-field>

            <mat-form-field class="w-full">
                <mat-label>Role</mat-label>
                <mat-select formControlName="role">
                    <mat-option *ngFor="let r of roles" [value]="r">
                        {{ r }}
                    </mat-option>
                </mat-select>
            </mat-form-field>

            <div class="flex justify-center space-x-2 items-center">
                <button mat-button class="bg-indigo-600 text-white">
                    Save
                </button>
            </div>
        </div>
    </form>
</ng-template>
