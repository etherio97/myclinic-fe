<div class="w-full p-3 sm:p-8 mx-auto">
    <form [formGroup]="formGroup" (ngSubmit)="submit()">
        <div class="mb-4">
            <h2 class="text-3xl font-semibold tracking-tight leading-8">
                Create New Patient
            </h2>
        </div>

        <div class="w-full pt-2 pb-2 mx-5 -ml-1">
            <div class="grid md:grid-cols-2 gap-4">
                <mat-form-field class="w-full">
                    <mat-label>Full Name</mat-label>
                    <input type="text" matInput formControlName="fullName" />
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Gender</mat-label>
                    <mat-select formControlName="gender">
                        <mat-option
                            [value]="gender"
                            *ngFor="let gender of genders"
                        >
                            {{ gender }}
                        </mat-option>
                    </mat-select>
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Date of Birth</mat-label>
                    <mat-hint>DD/MM/YYYY</mat-hint>
                    <input
                        matInput
                        [matDatepicker]="picker"
                        formControlName="dateOfBirth"
                        (click)="picker.open()"
                    />
                    <mat-datepicker-toggle
                        matIconSuffix
                        [for]="picker"
                    ></mat-datepicker-toggle>
                    <mat-datepicker #picker></mat-datepicker>
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Age</mat-label>
                    <input type="number" matInput formControlName="age" />
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Phone Number</mat-label>
                    <input type="text" matInput formControlName="phoneNumber" />
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>SSB Number</mat-label>
                    <input type="text" matInput formControlName="ssbNumber" />
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>NRC Number</mat-label>
                    <input type="text" matInput formControlName="nrcNumber" />
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Address</mat-label>
                    <textarea
                        matInput
                        formControlName="address"
                        rows="3"
                    ></textarea>
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Notes</mat-label>
                    <textarea
                        matInput
                        formControlName="notes"
                        rows="3"
                    ></textarea>
                </mat-form-field>
            </div>
        </div>

        <div class="flex justify-center items-center space-x-4">
            <button
                type="button"
                mat-flat-button
                (click)="closeModal()"
                class="flex items-center bg-slate-600 text-white"
            >
                <mat-icon
                    svgIcon="mat_outline:close"
                    class="icon-size-5 mr-2"
                ></mat-icon>
                Close
            </button>

            <button
                type="submit"
                mat-flat-button
                class="flex items-center bg-indigo-600 text-white"
            >
                <mat-icon
                    svgIcon="mat_outline:save"
                    class="icon-size-5 mr-2"
                ></mat-icon>
                Save
            </button>
        </div>
    </form>
</div>
