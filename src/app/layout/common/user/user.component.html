<!-- Button -->
<button mat-icon-button [matMenuTriggerFor]="userActions">
    <span class="relative">
        <mat-icon
            class="w-7 h-7 rounded-full"
            [svgIcon]="'heroicons_solid:user-circle'"
        ></mat-icon>
    </span>
</button>

<mat-menu [xPosition]="'before'" #userActions="matMenu">
    <button mat-menu-item>
        <span class="flex flex-col leading-none">
            <span>Signed in as</span>
            <span class="mt-1.5 text-md font-medium">
                {{ user.fullname || user.username }}
            </span>
        </span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="openChangePasswordModal()">
        Change Password
    </button>
    <mat-divider class="my-2"></mat-divider>
    <button mat-menu-item (click)="signOut()">
        <mat-icon [svgIcon]="'heroicons_outline:logout'"></mat-icon>
        <span>Sign out</span>
    </button>
</mat-menu>

<ng-template #changePasswordRef>
    <form [formGroup]="formGroup" (ngSubmit)="submit()">
        <div>
            <mat-form-field class="w-full">
                <mat-label>Old Password</mat-label>
                <input type="password" matInput formControlName="oldPassword" />
            </mat-form-field>

            <mat-form-field class="w-full">
                <mat-label>New Password</mat-label>
                <input type="password" matInput formControlName="newPassword" />
            </mat-form-field>

            <mat-form-field class="w-full">
                <mat-label>Retype Password</mat-label>
                <input
                    type="password"
                    matInput
                    formControlName="retypePassword"
                />
            </mat-form-field>
        </div>

        <div class="flex items-center justify-end space-x-2">
            <button
                mat-dialog-close
                mat-button
                class="bg-slate-600 text-white"
                type="button"
            >
                Cancel
            </button>
            <button mat-button class="bg-indigo-600 text-white" type="submit">
                Confirm
            </button>
        </div>
    </form>
</ng-template>
